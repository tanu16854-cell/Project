<!DOCTYPE html>
<html>
<head>
  <title>Store Dashboard</title>
  <link rel="stylesheet" href="mystore.css" />
</head>
<body>

  <div class="sidebar">
    <h2>Dashboard</h2>
    <ul>
      <li>Home</li>
      <li>Orders</li>
      <li>Products</li>
      <li>Customers</li>
      <li>Settings</li>
    </ul>
  </div>

  <div class="main">
    <header>
      <h1>My store</h1>
    </header>

    <section class="cards">
      <div class="card">
        <h3>Total Sales</h3>
      </div>
      <div class="card">
        <h3>Orders</h>
      </div>
      <div class="card">
        <h3>Customers</h3>
      </div>
    </section>

    <section class="orders">
      <h2>Recent Orders</h2>
      <table>
        <tr>
          <th>Order ID</th>
          <th>Customer</th>
          <th>Status</th>
          <th>Amount</th>
        </tr>
      </table>
    </section>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
