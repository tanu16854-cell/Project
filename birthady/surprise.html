<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Two Birthday Wishes — For Your Bestie</title>
  <style>
    :root{
      --accent:#ff4d6d;
      --accent-2:#ffd24d;
      --bg:#0f1724;
      --mono: #e6eef8;
      font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:linear-gradient(180deg,#071020 0%, #071832 40%, #052032 100%);color:var(--mono)}
    .app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:36px}
    .container{width:100%;max-width:1100px;background:linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:20px;padding:22px;box-shadow:0 8px 40px rgba(2,6,23,0.6);position:relative;overflow:hidden}

    .btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.04);padding:10px 14px;border-radius:12px;color:var(--mono);cursor:pointer;}
    .btn.active{box-shadow:0 6px 22px rgba(255,77,109,0.3);border-color:rgba(255,77,109,0.5);}

    .page{display:none;padding:18px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));}
    .page.show{display:block}

    .photo{width:280px;height:280px;border-radius:16px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#071024,#0c1a2a);border:1px solid rgba(255,255,255,0.04)}
    .photo img{width:100%;height:100%;object-fit:cover;display:block}
    .placeholder{color:rgba(255,255,255,0.4);text-align:center;padding:12px}

    h1{margin:0 0 12px;font-size:32px}

    /* Sparkle hearts */
    .sparkle-heart{position:absolute;width:18px;height:18px;background:radial-gradient(circle at 30% 30%, #fff, #ff4d6d 60%);clip-path:polygon(50% 0%,61% 8%,71% 20%,75% 35%,72% 50%,62% 65%,50% 80%,38% 65%,28% 50%,25% 35%,29% 20%,39% 8%);opacity:0;transform:scale(0)}

    /* Sparkle balloons */
    .sparkle-balloon{position:absolute;width:20px;height:26px;background:radial-gradient(circle at 40% 30%, #fff, #ffd24d 60%);border-radius:50% 50% 45% 45%;opacity:0;transform:scale(0)}

    .balloons{position:absolute;bottom:-80px;left:20px;pointer-events:none}
    .balloon{width:44px;height:60px;border-radius:50% 50% 45% 45%;background:linear-gradient(180deg,#ff6b9a,#ffb86b);display:inline-block;margin-right:12px;animation:float 4s ease-in-out infinite}
    .balloon:nth-child(2){animation-delay:0.6s;width:36px;height:48px;background:linear-gradient(180deg,#7be7ff,#6b8bff)}
    .balloon:nth-child(3){animation-delay:1.2s;width:50px;height:72px;background:linear-gradient(180deg,#b27bff,#ff7bd2)}
    @keyframes float{0%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-28px) rotate(6deg)}100%{transform:translateY(0) rotate(-4deg)}}

  </style>
</head>
<body>
  <div class="app">
    <div class="container">
      <button id="toggleSpark" class="btn">Toggle Sparkle Hearts & Balloons</button>

      <div class="page show" id="page1">
        <h1>Happy Birthday, Bestie! 🎂</h1>
        <div class="photo" id="photoCard">
          <div class="placeholder">Upload a photo</div>
        </div>
        <div class="balloons">
          <div class="balloon"></div>
          <div class="balloon"></div>
          <div class="balloon"></div>
        </div>
        <div id="sparkles"></div>
      </div>
    </div>
  </div>

  <script>
    const sparkWrap = document.getElementById('sparkles');
    let sparkOn = true;
    function createSpark(){
      sparkWrap.innerHTML='';
      for(let i=0;i<15;i++){
        const h = document.createElement('div');
        h.className = Math.random()>0.5 ? 'sparkle-heart' : 'sparkle-balloon';
        h.style.left = (Math.random()*100)+'%';
        h.style.top = (Math.random()*100)+'%';
        sparkWrap.appendChild(h);
        (function(el){
          setInterval(()=>{
            el.style.transition='transform 800ms, opacity 800ms';
            el.style.transform='scale(1.4)';
            el.style.opacity=1;
            setTimeout(()=>{el.style.transform='scale(0)';el.style.opacity=0},800);
          }, 1500+Math.random()*1000);
        })(h);
      }
    }
    createSpark();

    document.getElementById('toggleSpark').addEventListener('click', ()=>{
      sparkOn=!sparkOn;
      sparkWrap.style.display = sparkOn?'block':'none';
    });
  </script>
</body>
</html>
